# Nginx reverse proxy — Docker compose ports (host)
#   Shop:  3003   Admin: 3005   API: 3004
#
# Copy to /etc/nginx/sites-available/hhourssop.co.ke.conf
# sudo ln -sf /etc/nginx/sites-available/hhourssop.co.ke.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Shop (Next.js) — hhourssop.co.ke
server {
    listen 80;
    listen [::]:80;
    server_name hhourssop.co.ke www.hhourssop.co.ke;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Admin (Next.js) — admin.hhourssop.co.ke  → MUST be 3005 (not 3004 API)
server {
    listen 80;
    listen [::]:80;
    server_name admin.hhourssop.co.ke;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# API (NestJS) — api.hhourssop.co.ke
server {
    listen 80;
    listen [::]:80;
    server_name api.hhourssop.co.ke;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
